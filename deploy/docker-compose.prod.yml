# Flow CMS — production stack (single domain, automatic HTTPS), hardened.
#
#   Caddy  :80/:443  ──/api,/media,/socket.io──▶  api:4000
#                    ──everything else───────────▶  studio:3000
#   api ──▶ postgres   (bundled; or point DATABASE_URL at an external DB)
#
# Run from this directory so `.env` here is picked up:
#   cd deploy && cp .env.production.example .env && edit it
#   docker compose -f docker-compose.prod.yml up -d --build      # build from source
#   docker compose -f docker-compose.prod.yml up -d              # use prebuilt images
#
# Optional services:  --profile cache (redis)   --profile search (meilisearch)
# Hardened socket access (recommended): --profile secure-socket  (see the updater notes).
#
# Resource limits, log rotation, capabilities, healthchecks, graceful shutdown and a
# two-tier network are applied to every service. Limits are env-tunable (see the .env
# example) so they fit both small VPSes and large hosts without editing this file.
name: flowcms

# ─────────────────────────────────────────────────────────────────────────────
# Reusable defaults (extension fields + anchors), merged into services via `<<:`.
# ─────────────────────────────────────────────────────────────────────────────
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m" # rotate at 10MB…
    max-file: "5" #   …keep 5 → ≤50MB/service. Caps container logs so they can't fill the disk.

# Common safety defaults for the app/data containers (NOT the updater, which needs broad
# Docker access and is hardened separately via the secure-socket profile).
x-hardened: &hardened
  restart: unless-stopped
  init: true # PID 1 that reaps zombies + forwards signals (tini)
  security_opt:
    - no-new-privileges:true # processes can never gain privileges (CIS 5.25)
  logging: *logging

services:
  caddy:
    <<: *hardened
    image: caddy:2.8-alpine
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, CHOWN, SETGID, SETUID, DAC_OVERRIDE] # bind :80/:443 + drop privs
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env (e.g. cms.yoursite.com, or localhost)}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # Let's Encrypt account + certs — MUST persist
      - caddy_config:/config
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"] # Caddy admin API = liveness
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 5s
    stop_grace_period: 30s # let in-flight requests drain
    depends_on:
      api:
        condition: service_healthy
      studio:
        condition: service_started
    networks: [frontend]
    labels:
      com.flowcms.service: caddy
    deploy:
      resources:
        limits:
          memory: ${CADDY_MEM_LIMIT:-256M}
        reservations:
          memory: 32M

  studio:
    <<: *hardened
    image: ${STUDIO_IMAGE:-flowcms-studio:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: studio-runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    cap_drop: [ALL] # Next.js runs as non-root `node`; needs no Linux capabilities
    expose: ["3000"]
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
      start_interval: 5s
    stop_grace_period: 20s
    depends_on:
      api:
        condition: service_started # avoid serving SSR errors during the api's boot window
    networks: [frontend]
    labels:
      com.flowcms.service: studio
    deploy:
      resources:
        limits:
          memory: ${STUDIO_MEM_LIMIT:-512M}
          cpus: ${STUDIO_CPU_LIMIT:-1.0}
        reservations:
          memory: 128M

  api:
    <<: *hardened
    image: ${API_IMAGE:-flowcms-api:local}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api-runner
    cap_drop: [ALL] # NestJS runs as non-root `node`; needs no Linux capabilities
    env_file: .env # DATABASE_URL, secrets, STUDIO_URL, SEED_ADMIN_*, TRUST_PROXY, NODE_ENV…
    environment:
      # Reach the updater sidecar over the internal network (token is in .env).
      UPDATER_URL: http://updater:9000
    volumes:
      - media_data:/app/storage/media
    tmpfs:
      - /tmp
    expose: ["4000"]
    ulimits:
      nofile: { soft: 65535, hard: 65535 } # plenty of FDs under connection load
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s # first boot runs migrate + seed
      start_interval: 5s
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks: [frontend, backend] # edge (caddy) + data tier (postgres)
    labels:
      com.flowcms.service: api
    deploy:
      resources:
        limits:
          # Node 22 reads this cgroup limit and auto-tunes its V8 heap (~75%); no NODE_OPTIONS needed.
          memory: ${API_MEM_LIMIT:-1G}
          cpus: ${API_CPU_LIMIT:-2.0}
        reservations:
          memory: 256M

  # ── Updater sidecar: full backups + one-click upgrade. By DEFAULT it talks to Docker through
  #    the scoped, read-only socket-proxy (below), NOT the raw socket, so a compromised updater
  #    can't perform arbitrary host-root operations. To fall back to the direct socket (not
  #    recommended), set in .env:  UPDATER_DOCKER_HOST=  UPDATER_SOCKET=/var/run/docker.sock
  updater:
    image: ${UPDATER_IMAGE:-ghcr.io/flowcms-co/flowcms-updater:latest}
    build:
      context: ./updater
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    logging: *logging
    environment:
      UPDATER_TOKEN: ${UPDATER_TOKEN:?set UPDATER_TOKEN in .env}
      FLOWCMS_DIR: /opt/flowcms
      MEDIA_DIR: /media
      COMPOSE_PROJECT: flowcms
      FLOWCMS_VERSION: ${FLOWCMS_VERSION:-}
      # Default: route all Docker calls through the scoped proxy. Set empty for the direct socket.
      DOCKER_HOST: ${UPDATER_DOCKER_HOST-tcp://socket-proxy:2375}
    volumes:
      - ${FLOWCMS_HOST_DIR:-/opt/flowcms}:/opt/flowcms
      - media_data:/media
      # Default: no raw Docker socket (the proxy handles Docker). Set UPDATER_SOCKET to
      # /var/run/docker.sock only if you deliberately fall back to the direct socket.
      - ${UPDATER_SOCKET:-/dev/null}:/var/run/docker.sock
    expose: ["9000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s
    depends_on:
      socket-proxy:
        condition: service_started
    networks: [frontend, backend] # frontend = egress (pull from GHCR) + reach the proxy; backend = reach Postgres
    labels:
      com.flowcms.service: updater
    deploy:
      resources:
        limits:
          memory: ${UPDATER_MEM_LIMIT:-256M}

  # ── Scoped Docker-socket proxy (default-on). Holds the real socket read-only and exposes ONLY
  #    the API calls the updater needs, so the updater never gets raw host-root Docker access.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    logging: *logging
    environment:
      # Grant exactly the surface the updater uses: inspect/run/exec containers, manage images.
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      EXEC: 1
      BUILD: 1
      POST: 1 # required for any create/modify (pull, run, prune, compose up)
      INFO: 1
      PING: 1
      VERSION: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose: ["2375"]
    networks: [frontend]
    labels:
      com.flowcms.service: socket-proxy
    deploy:
      resources:
        limits:
          memory: 64M

  postgres:
    <<: *hardened
    image: postgres:16.6-alpine
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE, FOWNER] # entrypoint chowns data + drops privs
    shm_size: 256mb # parallel queries / large sorts need >64MB /dev/shm
    stop_signal: SIGINT # Postgres "fast shutdown" (clean, bounded)
    stop_grace_period: 1m
    ulimits:
      nofile: { soft: 65535, hard: 65535 }
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowcms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-flowcms}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowcms} -d ${POSTGRES_DB:-flowcms}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [backend] # data tier only; no internet egress, never published
    labels:
      com.flowcms.service: postgres
    deploy:
      resources:
        limits:
          # Raise PG_MEM_LIMIT for large datasets / high connection counts.
          memory: ${PG_MEM_LIMIT:-1G}
          cpus: ${PG_CPU_LIMIT:-2.0}
        reservations:
          memory: 256M

  # ── Optional: Redis (queues/webhooks). Enable with `--profile cache`
  #    and set REDIS_URL=redis://redis:6379 in .env.
  redis:
    <<: *hardened
    image: redis:7.4-alpine
    profiles: ["cache"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    # Bound memory + LRU eviction so Redis can never OOM the host; no RDB snapshots.
    command: ["redis-server", "--maxmemory", "${REDIS_MAXMEMORY:-256mb}", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [backend]
    labels:
      com.flowcms.service: redis
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-320M} # a little above maxmemory for overhead

  # ── Scaffolding (NOT yet used): Meilisearch. The API does not integrate it yet
  #    — search currently runs on Postgres, so enabling `--profile search` has no
  #    effect on the app. Reserved for a future search upgrade; leave it off.
  meilisearch:
    <<: *hardened
    image: getmeili/meilisearch:v1.11
    profiles: ["search"]
    cap_drop: [ALL]
    environment:
      # Set MEILI_MASTER_KEY in .env before enabling the `search` profile.
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [backend]
    labels:
      com.flowcms.service: meilisearch
    deploy:
      resources:
        limits:
          memory: ${MEILI_MEM_LIMIT:-512M}

networks:
  frontend: # edge + egress (caddy, studio, api, updater, socket-proxy)
  backend:
    internal: true # data tier (postgres/redis/meili): no route to the internet

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  media_data:
  redis_data:
  meili_data:
