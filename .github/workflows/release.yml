name: Release images

# Build and publish the Flow CMS container images to GHCR so managed platforms
# (Railway/Render) and the one-line installer can PULL a prebuilt image instead
# of building from a user's fork. Publishes three images:
#   - flowcms          (all-in-one: studio + API + proxy, one port) — Railway/Render
#   - flowcms-api      (NestJS API)        — docker-compose self-host
#   - flowcms-studio   (Next.js studio)    — docker-compose self-host
# Images are pushed to ghcr.io/<owner>/<name>, so this works for whatever org/user
# owns the repo without hardcoding a name.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.2.3 or latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: flowcms
            target: all-in-one
          - image: flowcms-api
            target: api-runner
          - image: flowcms-studio
            target: studio-runner
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          target: ${{ matrix.target }}
          # The studio bundle bakes a relative API base so one image works on any domain.
          build-args: ${{ matrix.image == 'flowcms-studio' && 'NEXT_PUBLIC_API_URL=/api' || '' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
